<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="controls">
        <h3>Controls:</h3>
        <p><b>A / D</b> or <b>Left / Right</b>: Move</p>
        <p><b>Space</b>: Jump</p>
        <p><b>Shift</b>: Run</p>
        <p><b>Q / W / E</b>: Attack</p>
        <p><b>S</b>: Defend / Protect</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
